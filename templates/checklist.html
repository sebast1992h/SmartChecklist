<!doctype html>
<html lang="de"></html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkliste: {{ name }}</title>
</head>
<body>
    <h1>Checkliste: {{ name }}</h1>

    <form method="post">
        {% for kategorie, items in grouped_items.items() %}
            <h2>{{ kategorie }}</h2>
            <ul>
                {% for item in items %}
                    <li>
                        <label>
                            <input  type="checkbox" 
                                    class="item-checkbox"
                                    data-name="{{ item.name }}"
                                    {% if item.checked %}checked{% endif %}>
                            {{ item.name }}
                            {% if item.anzahl is defined %} ({{ item.anzahl }} Stück){% endif %}
                        </label>
                    </li>
                {% endfor %}
            </ul>
        {% endfor %}
        <!--<button type="submit" name="update_checklist" value="1">Änderungen speichern</button>-->
    </form>

    <form method="post" style="margin-top: 20px;">
        <button type="submit" name="archivieren" value="1">Checkliste archivieren</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Zurück zur Startseite</a>

    <script>
        document.querySelectorAll('.item-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                fetch("{{ url_for('toggle_check_item', name=name) }}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        item_name: cb.dataset.name,
                        checked: cb.checked
                    })
                }).then(response => {
                    if (!response.ok) {
                        alert("Fehler beim Speichern!");
                    }
                });
            });
        });
    </script>
</body>
</html>
